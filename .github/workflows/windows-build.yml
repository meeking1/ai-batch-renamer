name: Windows Build

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build
        run: msbuild AiBatchRenamer.sln /p:Configuration=Release /p:Platform="Any CPU"

      - name: Run tests
        run: src\AiBatchRenamer.Tests\bin\Release\AiBatchRenamer.Tests.exe

      - name: Verify single exe app output
        shell: pwsh
        run: |
          if (-not (Test-Path "src\AiBatchRenamer.App\bin\Release\AiBatchRenamer.exe")) {
            throw "AiBatchRenamer.exe was not built."
          }
          if (Test-Path "src\AiBatchRenamer.App\bin\Release\AiBatchRenamer.Core.dll") {
            throw "App output still contains AiBatchRenamer.Core.dll."
          }
          if (Test-Path "src\AiBatchRenamer.App\bin\Release\AiBatchRenamer.Infrastructure.dll") {
            throw "App output still contains AiBatchRenamer.Infrastructure.dll."
          }

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          iscc installer\AiBatchRenamer.iss

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: AiBatchRenamer-Release
          path: src/AiBatchRenamer.App/bin/Release/

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: AiBatchRenamer-Setup
          path: installer/output/*.exe
